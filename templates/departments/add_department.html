{% extends 'base.html' %}

{% block content %}

<h2>Add Department</h2>

<br>

<div style="background:white;padding:25px;border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);width:500px;">

<form method="POST">

{% csrf_token %}

<label>Department Name</label>
<input type="text" name="name" class="form">

<label>Department Head</label>
<input type="text" name="head" class="form">

<br><br>

<button type="submit" class="btn">Save Department</button>

</form>

</div>

<style>

.form{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
margin-top:5px;
}

.btn{
background:#0f1e2e;
color:white;
padding:12px 20px;
border:none;
border-radius:6px;
}

</style>

{% endblock %}
