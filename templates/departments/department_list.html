{% extends 'base.html' %}

{% block content %}

<h2>Departments</h2>

<br>

<div style="background:white;padding:20px;border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);">

<a href="/departments/add/"
style="background:#0f1e2e;color:white;padding:10px 15px;
text-decoration:none;border-radius:6px;">
+ Add Department
</a>

<br><br>

<table style="width:100%;border-collapse:collapse;">

<tr style="background:#f4f6fb;text-align:left;">
<th style="padding:12px;">Department Name</th>
<th style="padding:12px;">Head</th>
<th style="padding:12px;">Employees</th>
<th style="padding:12px;">Action</th>
</tr>

{% for d in departments %}

<tr style="border-top:1px solid #eee;">

<td style="padding:10px;">{{ d.name }}</td>
<td style="padding:10px;">{{ d.head }}</td>
<td style="padding:10px;">{{ d.count }}</td>

<td style="padding:10px;">

<a href="/departments/edit/{{ d.id }}/"
style="background:#1f3a5f;color:white;padding:6px 10px;
border-radius:5px;text-decoration:none;">
Edit
</a>

<a href="/departments/delete/{{ d.id }}/"
style="background:red;color:white;padding:6px 10px;
border-radius:5px;text-decoration:none;">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
