{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Commission</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f5f7fb;
}

.sidebar{
width:250px;
background:#0B2C5F;
position:fixed;
top:0;
bottom:0;
color:white;
}

.logo{
padding:20px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.1);
}

.logo img{
height:45px;
}

.menu a{
display:block;
color:white;
padding:14px 20px;
text-decoration:none;
}

.menu a:hover{
background:#1e4fa3;
}

.content{
margin-left:250px;
padding:25px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,.05);
border-left:4px solid #0B2C5F;
}

.table{
background:white;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,.05);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#f5f7fb;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="{% static 'logo.png' %}">
</div>

<div class="menu">
<a href="/partner/">Dashboard</a>
<a href="/partner/leads/">My Leads</a>
<a href="/partner/customers/">My Customers</a>
<a href="/partner/commission/">Commission</a>
<a href="#">Reports</a>
<a href="#">Profile</a>
</div>

</div>

<div class="content">

<h2>Commission</h2>

<div class="cards">

<div class="card">
<h3>₹50,000</h3>
<p>Total Commission</p>
</div>

<div class="card">
<h3>₹20,000</h3>
<p>Paid</p>
</div>

<div class="card">
<h3>₹30,000</h3>
<p>Pending</p>
</div>

</div>

<div class="table">

<table>
<tr>
<th>Customer</th>
<th>Service</th>
<th>Amount</th>
<th>Status</th>
</tr>

<tr>
<td>ABC School</td>
<td>ERP</td>
<td>₹10,000</td>
<td>Paid</td>
</tr>

<tr>
<td>XYZ College</td>
<td>Website</td>
<td>₹20,000</td>
<td>Pending</td>
</tr>

</table>

</div>

</div>

</body>
</html>
