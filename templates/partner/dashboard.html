{% load static %}
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Channel Partner Dashboard</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f5f7fb;
}

/* Sidebar */

.sidebar{
width:250px;
background:#0B2C5F;
position:fixed;
top:0;
bottom:0;
color:white;
}

.logo{
padding:20px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.1);
}

.logo img{
height:45px;
}

.menu{
padding:10px 0;
}

.menu a{
display:block;
color:white;
padding:14px 20px;
text-decoration:none;
font-size:14px;
}

.menu a:hover{
background:#1e4fa3;
}

/* Content */

.content{
margin-left:250px;
padding:25px;
}

.topbar{
background:white;
padding:15px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,.05);
border-left:4px solid #0B2C5F;
}

.card h3{
margin:0;
font-size:22px;
color:#0B2C5F;
}

.card p{
margin:5px 0 0;
color:#777;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="{% static 'logo.png' %}">
</div>

<div class="menu">
<a href="#">Dashboard</a>
<a href="#">My Leads</a>
<a href="#">My Customers</a>
<a href="#">Commission</a>
<a href="#">Reports</a>
<a href="#">Profile</a>
<a href="/logout/">Logout</a>
</div>

</div>

<div class="content">

<div class="topbar">
<h2>Channel Partner Dashboard</h2>
</div>

<div class="cards">

<div class="card">
<h3>25</h3>
<p>Total Leads</p>
</div>

<div class="card">
<h3>12</h3>
<p>Converted Clients</p>
</div>

<div class="card">
<h3>₹45,000</h3>
<p>Total Commission</p>
</div>

<div class="card">
<h3>5</h3>
<p>Pending Payments</p>
</div>

</div>

</div>

</body>
</html>
