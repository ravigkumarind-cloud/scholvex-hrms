{% load static %}
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Channel Partner Login</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0B2C5F,#1e4fa3);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-container{
width:100%;
max-width:420px;
padding:20px;
}

.login-box{
background:white;
padding:40px;
border-radius:8px;
box-shadow:0 20px 50px rgba(0,0,0,.2);
}

.logo{
text-align:center;
margin-bottom:15px;
}

.logo img{
height:60px;
}

h3{
text-align:center;
margin:10px 0 20px;
color:#0B2C5F;
font-weight:600;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border:1px solid #ddd;
border-radius:4px;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:18px;
background:#0B2C5F;
color:white;
border:none;
border-radius:4px;
font-size:15px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1e4fa3;
}

.back-link{
text-align:center;
margin-top:15px;
}

.back-link a{
text-decoration:none;
color:#0B2C5F;
font-size:13px;
}

.partner-badge{
text-align:center;
font-size:13px;
color:#777;
margin-top:5px;
}

@media(max-width:500px){
.login-box{
padding:25px;
}
}

</style>

</head>

<body>

<div class="login-container">

<div class="login-box">

<div class="logo">
<img src="{% static 'logo.png' %}">
</div>

<h3>Channel Partner Login</h3>

<div class="partner-badge">
Authorized Channel Partner Access
</div>

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Partner ID / Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="back-link">
<a href="/accounts/login/">← Back to Login</a>
</div>

</div>
</div>

</body>
</html>
